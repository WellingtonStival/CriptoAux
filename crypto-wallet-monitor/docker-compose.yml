services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: crypto_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "8000:8000"
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: crypto_scheduler
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    command: sh -c "composer install && php artisan schedule:work"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: crypto_db
    environment:
      POSTGRES_DB: crypto_db
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_user -d crypto_db"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  frontend:
    image: node:20-alpine
    container_name: crypto_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  postgres_data:

